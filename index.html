<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>贪吃蛇大乱斗 - 联机版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
canvas{border:2px solid #1a1a2e;border-radius:8px;display:block;touch-action:none}
#join-ui{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px)}
#join-ui h1{font-size:2.4rem;margin-bottom:.5rem;background:linear-gradient(135deg,#39d353,#58a6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;font-weight:700;letter-spacing:2px}
#join-ui .sub{color:#666;font-size:.85rem;margin-bottom:2rem}
.modal{background:#12121a;border:1px solid #1e1e2e;border-radius:16px;padding:2rem;width:min(380px,90vw);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h2{font-size:1.1rem;color:#888;margin-bottom:1.2rem;text-align:center;font-weight:400}
label{display:block;color:#aaa;font-size:.8rem;margin-bottom:.4rem}
input{width:100%;padding:.7rem 1rem;border:1px solid #2a2a3a;border-radius:8px;background:#0a0a14;color:#fff;font-size:1rem;outline:none;margin-bottom:1rem;transition:border-color .2s}
input:focus{border-color:#39d353}
input::placeholder{color:#444}
.btn{display:block;width:100%;padding:.8rem;border:none;border-radius:8px;font-size:1rem;cursor:pointer;transition:all .2s;font-weight:600;margin-top:.5rem}
.btn-green{background:linear-gradient(135deg,#39d353,#28a745);color:#fff}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(57,211,83,.3)}
.hint{color:#444;font-size:.72rem;text-align:center;margin-top:1rem;line-height:1.5}
.hint a{color:#58a6ff;text-decoration:none}
#top-bar{position:fixed;top:0;left:0;right:0;padding:.5rem 1rem;background:rgba(10,10,15,.9);border-bottom:1px solid #1a1a2e;display:flex;align-items:center;justify-content:space-between;z-index:50;backdrop-filter:blur(4px)}
#room-label{font-size:.8rem;color:#888}
#my-color{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
#rank-list{display:flex;gap:.5rem;font-size:.75rem;color:#aaa;flex-wrap:wrap;justify-content:flex-end;max-width:60vw}
.rank-item{display:flex;align-items:center;gap:3px;background:#1a1a2e;padding:2px 6px;border-radius:4px;white-space:nowrap}
.rank-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rank-name{max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-score{color:#39d353}
#game-wrap{position:relative;display:flex;flex-direction:column;align-items:center;margin-top:50px}
#status{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);font-size:.75rem;color:#444;z-index:50}
#ctrl-hint{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);font-size:.7rem;color:#333;z-index:50;text-align:center;display:none}
#mobile-ctrl{position:fixed;bottom:1.5rem;left:0;right:0;display:none;justify-content:center;z-index:50;padding:0 1rem}
.ctrl-grid{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);gap:3px}
.ctrl-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-size:1.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;backdrop-filter:blur(4px)}
.ctrl-btn:active{background:rgba(255,255,255,.18)}
.ctrl-empty{background:none;border:none}
.ctrl-center{background:rgba(57,211,83,.15);border-color:rgba(57,211,83,.3)}
#my-score-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:700;color:#39d353;pointer-events:none;z-index:200;opacity:0;transition:opacity .3s;text-shadow:0 0 20px rgba(57,211,83,.5)}
</style>
</head>
<body>

<div id="join-ui">
  <h1>贪吃蛇大乱斗</h1>
  <div class="sub">最多8人同屏，支持手机触屏</div>
  <div class="modal">
    <h2>加入游戏</h2>
    <label>房间号（不填则随机）</label>
    <input id="in-room" placeholder="例如: room1" maxlength="20">
    <label>服务器地址</label>
    <input id="in-server" placeholder="https://你的cpolar地址.cpolar.top" value="">
    <label>你的名字（选填）</label>
    <input id="in-name" placeholder="留空随机取名" maxlength="8">
    <button class="btn btn-green" id="btn-join">进入游戏</button>
    <div class="hint">首次使用需要运行游戏服务器<br>和 cpolar 穿透，延迟与本地网络一致</div>
  </div>
</div>

<div id="top-bar">
  <div id="room-label"></div>
  <div id="rank-list"></div>
</div>

<div id="game-wrap">
  <canvas id="c"></canvas>
</div>
<div id="mobile-ctrl">
  <div class="ctrl-grid">
    <div class="ctrl-empty"></div>
    <div class="ctrl-btn" data-dir="up">▲</div>
    <div class="ctrl-empty"></div>
    <div class="ctrl-btn" data-dir="left">◀</div>
    <div class="ctrl-btn ctrl-center" id="ctrl-go">GO</div>
    <div class="ctrl-btn" data-dir="right">▶</div>
    <div class="ctrl-empty"></div>
    <div class="ctrl-btn" data-dir="down">▼</div>
    <div class="ctrl-empty"></div>
  </div>
</div>
<div id="ctrl-hint">方向键 / WASD / 滑动屏幕 控制移动</div>
<div id="status"></div>
<div id="my-score-flash"></div>

<script>
// ─── 状态 ───────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLS = 30, ROWS = 30;
const CELL = Math.min(Math.floor((Math.min(window.innerWidth, 600) - 20) / COLS), 22);
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

let myId = null, myTick = 0;
let players = {}, foods = [], myColor = '#39d353';
let connected = false, myDead = false;
let serverUrl = '', roomId = 'default';
let pollTimer = null;
let lastDir = {x:1,y:0};

// 名字颜色
const NAMES=['绿蛇','蓝蛇','红蛇','金蛇','紫蛇','橙蛇','天蓝','橘黄'];
const COLORS=['#39d353','#58a6ff','#f85149','#e3b341','#bc8cff','#ff7b72','#79c0ff','#ffa657'];

// ─── 服务器URL参数 ──────────────────────────────────────
const params = new URLSearchParams(location.search);
const defServer = params.get('server') || '';
const defRoom = params.get('room') || '';
if (defServer) document.getElementById('in-server').value = defServer;
if (defRoom) document.getElementById('in-room').value = defRoom;

// ─── 方向映射 ────────────────────────────────────────────
const DIR_MAP = {up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};

// ─── HTTP 轮询 ───────────────────────────────────────────
function poll() {
  if (!serverUrl || !connected) return;
  const url = serverUrl + '/poll?r=' + encodeURIComponent(roomId) + '&id=' + myId + '&tick=' + myTick;
  fetch(url).then(r => r.json()).then(data => {
    if (data.type === 'state') applyState(data);
  }).catch(()=>{});
}

function sendDir(dx, dy) {
  if (!serverUrl || !myId) return;
  fetch(serverUrl + '/msg?r=' + encodeURIComponent(roomId) + '&id=' + myId, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({type:'dir', dir:{x:dx,y:dy}})
  }).catch(()=>{});
}

function applyState(data) {
  myTick = data.tick || 0;
  foods = (data.foods||[]).map(f=>(f.x,f.y));
  foods = (data.foods||[]);

  // 处理 join/leave/others
  const ids = Object.keys(data.players||{});
  if (ids.length && !myId) {
    myId = ids[ids.length-1]; // 自己取最后一个
  }

  for (const [id, p] of Object.entries(data.players||{})) {
    if (id === myId) {
      myColor = p.color;
      myDead = !p.alive;
    }
  }

  players = data.players||{};
  render();
  updateRank();
}

function updateRank() {
  const sorted = Object.values(players).sort((a,b)=>b.score-a.score);
  document.getElementById('rank-list').innerHTML = sorted.slice(0,5).map(p=>{
    const me = p.color===myColor;
    return `<div class="rank-item" style="${me?'background:rgba(57,211,83,.2);border:1px solid rgba(57,211,83,.4)':''}">
      <span class="rank-dot" style="background:${p.color}"></span>
      <span class="rank-name">${p.name||'??'}</span>
      <span class="rank-score">${p.score}</span>
    </div>`;
  }).join('');
}

// ─── 加入 ───────────────────────────────────────────────
document.getElementById('btn-join').onclick = ()=>{
  roomId = document.getElementById('in-room').value.trim() || 'room'+Math.floor(Math.random()*9000+1000);
  serverUrl = document.getElementById('in-server').value.replace(/\/$/,'');
  const name = document.getElementById('in-name').value.trim();
  if (!serverUrl) { alert('请输入服务器地址'); return; }

  // 首次请求加入（GET /poll 会自动创建玩家）
  document.getElementById('join-ui').style.display = 'none';
  document.getElementById('room-label').textContent = '🏠 ' + roomId;
  if (navigator.maxTouchPoints > 0) {
    document.getElementById('mobile-ctrl').style.display = 'flex';
  }
  document.getElementById('ctrl-hint').style.display = 'block';
  connected = true;
  poll();
  pollTimer = setInterval(poll, 200);
};

// ─── 键盘控制 ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  const map = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
    w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
    W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
  const d = map[e.key];
  if (d) { e.preventDefault(); tryDir(d.x, d.y); }
});

// ─── 触屏控制 ───────────────────────────────────────────
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart', e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY},{passive:true});
canvas.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-touchStartX, dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<15&&Math.abs(dy)<15)return;
  if(Math.abs(dx)>Math.abs(dy)) tryDir(dx>0?{x:1,y:0}:{x:-1,y:0});
  else tryDir(dy>0?{x:0,y:1}:{x:0,y:-1});
},{passive:true});

document.querySelectorAll('.ctrl-btn[data-dir]').forEach(b=>{
  b.addEventListener('touchstart',e=>{e.preventDefault();const d=DIR_MAP[b.dataset.dir];tryDir(d.x,d.y);},{passive:false});
  b.addEventListener('click',()=>{const d=DIR_MAP[b.dataset.dir];tryDir(d.x,d.y);});
});

function tryDir(dx, dy) {
  const p = players[myId];
  if (!p) return;
  const cur = p.dir||{x:1,y:0};
  if (dx===-cur.x&&dy===-cur.y) return; // 不能反向
  lastDir = {x:dx,y:dy};
  sendDir(dx, dy);
}

// ─── 渲染 ───────────────────────────────────────────────
function render() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 网格（淡化）
  ctx.strokeStyle = 'rgba(255,255,255,.02)';
  ctx.lineWidth = .5;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,ROWS*CELL);ctx.stroke();}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(COLS*CELL,y*CELL);ctx.stroke();}

  // 食物
  foods.forEach(f=>{
    const cx=f.x*CELL+CELL/2, cy=f.y*CELL+CELL/2;
    const r=CELL*.4;
    ctx.beginPath();
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    grd.addColorStop(0,'rgba(255,107,107,.9)');
    grd.addColorStop(1,'rgba(255,50,50,.6)');
    ctx.fillStyle=grd;
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fill();
    // 光晕
    ctx.beginPath();
    ctx.fillStyle='rgba(255,80,80,.15)';
    ctx.arc(cx,cy,r*1.5,0,Math.PI*2);
    ctx.fill();
  });

  // 蛇
  Object.entries(players).forEach(([id,p])=>{
    if(!p||!p.body||!p.body.length)return;
    const me=id===myId;
    p.body.forEach((seg,i)=>{
      const sx=seg.x*CELL, sy=seg.y*CELL;
      const head=i===0;
      if(me&&!p.alive){ctx.globalAlpha=.3+Math.sin(Date.now()*.01)*.2;}

      // 身体
      const grd=ctx.createLinearGradient(sx,sy,sx+CELL,sy+CELL);
      grd.addColorStop(0,p.color);
      grd.addColorStop(1,adjustColor(p.color,-40));
      ctx.fillStyle=grd;
      const pad=head?0:1;
      ctx.beginPath();
      ctx.roundRect(sx+pad,sy+pad,CELL-pad*2,CELL-pad*2,head?4:2);
      ctx.fill();

      // 高光
      ctx.fillStyle='rgba(255,255,255,.15)';
      ctx.beginPath();
      ctx.roundRect(sx+pad+2,sy+pad+2,CELL-pad*2-4,(CELL-pad*2)/2,2);
      ctx.fill();

      // 眼睛
      if(head&&p.alive){
        const d=p.dir||{x:1,y:0};
        const ex=sx+CELL/2+d.x*CELL*.25, ey=sy+CELL/2+d.y*CELL*.25;
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(ex+d.y*.15*CELL,ey-d.x*.15*CELL,2.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(ex-d.y*.15*CELL,ey+d.x*.15*CELL,2.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#000';
        ctx.beginPath();ctx.arc(ex+d.y*.15*CELL+d.x,ey-d.x*.15*CELL+d.y,1.2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(ex-d.y*.15*CELL+d.x,ey+d.x*.15*CELL+d.y,1.2,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    });

    // 名字
    if(p.body.length>0){
      const h=p.body[0];
      ctx.fillStyle=p.color;
      ctx.font=`bold ${Math.max(9,CELL*.45)}px sans-serif`;
      ctx.textAlign='center';
      ctx.fillText(p.name||'',h.x*CELL+CELL/2,h.y*CELL-2);
    }
  });
}

function adjustColor(hex,amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,Math.max(0,(n>>16)+amt));
  const g=Math.min(255,Math.max(0,((n>>8)&0xff)+amt));
  const b=Math.min(255,Math.max(0,(n&0xff)+amt));
  return'#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

setInterval(render, 60);
</script>
</body>
</html>
